<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Manasa ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
overflow:hidden;
height:100vh;
background:linear-gradient(-45deg,#ff4e50,#fc913a,#ff6ec7,#845ec2);
background-size:400% 400%;
animation:bgMove 12s ease infinite;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
position:relative;
z-index:2;
text-align:center;
width:100%;
padding:20px;
}

.hidden{
display:none;
}

h1{
    margin-top:30px;
    color:white;
    font-size:3em;
    animation: glow 2s infinite alternate;
}

@keyframes glow{
    from{ text-shadow:0 0 10px white; }
    to{ text-shadow:0 0 30px yellow; }
}

.gallery{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
    margin-top:30px;
}

.gallery img{
    width:220px;
    height:220px;
    object-fit:cover;
    border-radius:20px;
    border:5px solid white;
    box-shadow:0 0 20px rgba(0,0,0,0.3);
    transition:0.5s;
}

.gallery img:hover{
    transform:scale(1.1) rotate(5deg);
}

.message{
    color:white;
    font-size:1.4em;
    margin:20px;
}

button{
padding:15px 35px;
font-size:18px;
border:none;
border-radius:50px;
cursor:pointer;
font-weight:bold;
background:white;
color:#ff4e50;
box-shadow:0 0 20px white;
transition:.3s;
}

button:hover{
transform:scale(1.1);
}

#slideshow{
perspective:1200px;
margin:auto;
width:280px;
height:360px;
}

.photo-frame{
width:280px;
height:360px;
border:10px solid white;
border-radius:25px;
overflow:hidden;
box-shadow:0 0 40px rgba(255,255,255,.8);
animation:rotateFrame 8s linear infinite;
transform-style:preserve-3d;
}

.photo-frame img{
width:100%;
height:100%;
object-fit:cover;
transition:1s;
}

@keyframes rotateFrame{
0%{
transform:rotateY(0deg);
}
100%{
transform:rotateY(360deg);
}
}

.message{
margin-top:20px;
max-width:800px;
margin-left:auto;
margin-right:auto;
}

#typingText{
font-size:20px;
line-height:1.8;
white-space:pre-wrap;
border-right:3px solid white;
display:inline-block;
padding:10px;
text-shadow:0 0 10px black;
animation:blink .8s infinite;
}

@keyframes blink{
50%{
border-color:transparent;
}
}

#balloons{
position:fixed;
width:100%;
height:100%;
overflow:hidden;
z-index:0;
}

.balloon{
position:absolute;
bottom:-150px;
width:60px;
height:80px;
border-radius:50%;
animation:floatUp linear infinite;
}

.balloon:before{
content:'';
position:absolute;
width:2px;
height:100px;
background:white;
left:50%;
top:80px;
}

@keyframes floatUp{
0%{
transform:translateY(0);
}
100%{
transform:translateY(-120vh);
}
}

.hearts{
position:fixed;
width:100%;
height:100%;
overflow:hidden;
z-index:1;
pointer-events:none;
}

.hearts span{
position:absolute;
font-size:25px;
animation:heartFloat linear infinite;
}

@keyframes heartFloat{
0%{
transform:translateY(100vh);
opacity:1;
}
100%{
transform:translateY(-100px);
opacity:0;
}
}

@media(max-width:600px){

h1{
font-size:2rem;
}

#typingText{
font-size:16px;
}

.photo-frame{
width:240px;
height:320px;
}

}

</style>
</head>

<body>

<div id="balloons"></div>

<div class="hearts" id="hearts"></div>

<div class="container">

<div id="welcome">

<h1>🎂 Happy Birthday Manasa 🎂</h1>

<p style="font-size:22px;margin-bottom:25px;">
A Special Surprise For You ❤️
</p>

<div class="gallery">
    <img src="Manasa4.jpg" alt="Photo 1">
    <img src="Manasa8.jpg" alt="Photo 2">
    <img src="Manasa5.jpg" alt="Photo 3">
</div>

<button onclick="startShow()">
Open Surprise 🎁
</button>

</div>

<div id="mainContent" class="hidden">

<h1>Happy Birthday Manasa ❤️</h1>

<div id="slideshow">

<div class="photo-frame">
<img id="photo" src="Manasa5.jpg">
</div>

</div>

<div class="message">
<p id="typingText"></p>
</div>

</div>

</div>

<script>

const photos=[
"Manasa6.jpg",
"Manasa9.jpg",
"Manasa1.jpg",
"Manasa5.jpg",
"Manasa3.jpg",
"Manasa4.jpg",
"Manasa8.jpg",
"Manasa11.jpg"
];

let photoIndex=0;

function startShow(){

document.getElementById("welcome").classList.add("hidden");
document.getElementById("mainContent").classList.remove("hidden");

typeMessage();

setInterval(()=>{

photoIndex++;

if(photoIndex>=photos.length){
photoIndex=0;
}

const img=document.getElementById("photo");

img.style.transform="scale(0.8)";

setTimeout(()=>{

img.src=photos[photoIndex];

img.style.transform="scale(1.15)";

setTimeout(()=>{
img.style.transform="scale(1)";
},1000);

},500);

},4000);

}

const message = "Hey you, some people get stuck in our minds, or there are things that remind us of them—maybe strong coffee ☕ or coke 😎. As you know, I was very talkative and immature in the beginning, but being with uh changed me a lot. It made me more mature and gentleman-like, and now other girls feel safe around me 😁 credits goes to uh. I know we haven't talked for 111 days, but I don't think that changes our friendship 😉. Whenever life feels difficult, my place is always safe, secure, and private for uh. You and ur feelings are always secure with me, u will always find me standing next to uh, IDK that I will thr with u in ur ups, but in ur downs always";

let i=0;

function typeMessage(){

const text=document.getElementById("typingText");

function typing(){

if(i<message.length){

text.innerHTML+=message.charAt(i);

i++;

setTimeout(typing,50);

}

}

typing();

}

const balloons=document.getElementById("balloons");

for(let i=0;i<25;i++){

const b=document.createElement("div");

b.className="balloon";

b.style.left=Math.random()*100+"%";

b.style.background=
`hsl(${Math.random()*360},100%,70%)`;

b.style.animationDuration=
(6+Math.random()*6)+"s";

balloons.appendChild(b);

}

const hearts=document.getElementById("hearts");

for(let i=0;i<25;i++){

const h=document.createElement("span");

h.innerHTML="❤️";

h.style.left=Math.random()*100+"%";

h.style.animationDuration=
(5+Math.random()*6)+"s";

h.style.animationDelay=
Math.random()*5+"s";

hearts.appendChild(h);

}

</script>

</body>
</html>
